services:

  # ── MONGODB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: smart_dashboard_db
    restart: unless-stopped
    # ports:
    #   - "27017:27017"   # commented out - using internal network only
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: smart_dashboard
    volumes:
      # Persist data even when container is stopped
      - mongodb_data:/data/db
    networks:
      app_network:
        aliases:
          - mongodb


  # ── BACKEND (Node.js) ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_dashboard_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://admin:password123@mongodb:27017/smart_dashboard?authSource=admin
      JWT_SECRET: your_jwt_secret_change_this_in_production
      JWT_EXPIRE: 7d
      ML_SERVICE_URL: http://ml-service:5001
      FRONTEND_URL: http://localhost:3000
    volumes:
      # Mount source code for hot reload in development
      - ./backend:/app
      - /app/node_modules   # preserve container's node_modules
    depends_on:
      - mongodb
    networks:
      - app_network


  # ── ML SERVICE (Python Flask) ────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: smart_dashboard_ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      MODEL_DIR: /app/models
      FLASK_ENV: development
    volumes:
      - ./ml-service/models:/app/models
      - ./ml-service/data:/app/data
    networks:
      - app_network


  # ── FRONTEND (React) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_dashboard_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - app_network


  # ── NGINX (Reverse Proxy) ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: smart_dashboard_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      # For production with SSL, use:
      # - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./certbot/conf:/etc/letsencrypt:ro
      # - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_network


# ── NETWORKS ──────────────────────────────────────────────
networks:
  app_network:
    driver: bridge  # private internal network for containers


# ── PERSISTENT VOLUMES ────────────────────────────────────
volumes:
  mongodb_data:     # MongoDB data persists here